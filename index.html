<tr><td><code>ip addr</code> (o <code>ip a</code>)</td><td>Tus interfaces de red y sus direcciones IP.</td></tr>
<tr><td><code>ip route</code></td><td>La tabla de rutas: por dónde sale el tráfico (tu gateway).</td></tr>
<tr><td><code>ip link</code></td><td>Estado físico de las interfaces (up/down).</td></tr>
<tr><td><code>hostname -I</code></td><td>Atajo para ver rápido tus IPs.</td></tr>
</tbody></table>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">ip addr</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">ip addr</span></div>
<div class="l"><span class="out">2: eth0: &lt;BROADCAST,MULTICAST,UP&gt; mtu 1500</span></div>
<div class="l"><span class="out">    inet </span><span class="hl">192.168.1.50</span><span class="out">/24 brd 192.168.1.255 scope global eth0</span></div>
<div class="l"><span class="cm">#        └ tu IP        └ máscara (/24 = 255.255.255.0)</span></div>
</div></div>

<h2>Comprobar conectividad</h2>
<div class="diagram">
<svg viewBox="0 0 600 130" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace" font-size="12">
  <rect x="20" y="45" width="90" height="44" rx="7" fill="#1e2128" stroke="#8ec07c"/><text x="65" y="72" text-anchor="middle" fill="#8ec07c">tu servidor</text>
  <rect x="250" y="45" width="90" height="44" rx="7" fill="#1e2128" stroke="#f2a541"/><text x="295" y="72" text-anchor="middle" fill="#f2a541">DNS</text>
  <rect x="480" y="45" width="100" height="44" rx="7" fill="#1e2128" stroke="#7cc5c9"/><text x="530" y="72" text-anchor="middle" fill="#7cc5c9">sitio destino</text>
  <line x1="110" y1="67" x2="248" y2="67" stroke="#6b7280"/><polygon points="248,67 240,63 240,71" fill="#6b7280"/>
  <text x="179" y="40" text-anchor="middle" fill="#9aa0ac" font-size="11">dig / nslookup</text>
  <text x="179" y="105" text-anchor="middle" fill="#6b7280" font-size="10">¿nombre → IP?</text>
  <line x1="340" y1="67" x2="478" y2="67" stroke="#6b7280"/><polygon points="478,67 470,63 470,71" fill="#6b7280"/>
  <text x="409" y="40" text-anchor="middle" fill="#9aa0ac" font-size="11">ping / traceroute</text>
  <text x="409" y="105" text-anchor="middle" fill="#6b7280" font-size="10">¿llega el paquete?</text>
</svg>
<div class="cap">Diagnóstico por capas: primero resolvés el nombre, después probás la conexión</div>
</div>
<table class="cmdtable">
<thead><tr><th>Comando</th><th>Qué hace</th></tr></thead>
<tbody>
<tr><td><code>ping google.com</code></td><td>¿Hay conexión? Mide latencia. Cortá con <kbd>Ctrl</kbd>+<kbd>C</kbd>.</td></tr>
<tr><td><code>traceroute google.com</code></td><td>Muestra el camino (saltos) que recorre el tráfico.</td></tr>
<tr><td><code>dig google.com</code></td><td>Consulta DNS detallada: qué IP resuelve un dominio.</td></tr>
<tr><td><code>nslookup google.com</code></td><td>Alternativa más simple para resolver nombres.</td></tr>
<tr><td><code>ss -tuln</code></td><td>Puertos que tu servidor está escuchando (reemplaza a <code>netstat</code>).</td></tr>
</tbody></table>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">ss -tuln — ¿qué está escuchando?</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">ss <span class="fl">-tuln</span></span></div>
<div class="l"><span class="out">Netid  State   Local Address:Port</span></div>
<div class="l"><span class="out">tcp    LISTEN  0.0.0.0:</span><span class="hl">22</span><span class="out">          </span><span class="cm"># SSH</span></div>
<div class="l"><span class="out">tcp    LISTEN  0.0.0.0:</span><span class="hl">80</span><span class="out">          </span><span class="cm"># web (HTTP)</span></div>
<div class="l"><span class="out">tcp    LISTEN  127.0.0.1:</span><span class="hl">5432</span><span class="out">       </span><span class="cm"># PostgreSQL (solo local)</span></div>
</div></div>

<h2>Descargar y transferir</h2>
<table class="cmdtable">
<thead><tr><th>Comando</th><th>Qué hace</th></tr></thead>
<tbody>
<tr><td><code>curl -O https://.../archivo.zip</code></td><td>Descarga un archivo. Sin <code>-O</code>, imprime la respuesta (ideal para APIs).</td></tr>
<tr><td><code>wget https://.../archivo.zip</code></td><td>Descargador clásico, bueno para archivos grandes y reintentos.</td></tr>
<tr><td><code>scp archivo user@host:/ruta</code></td><td>Copia un archivo a otro servidor de forma segura (sobre SSH).</td></tr>
<tr><td><code>rsync -avz origen/ user@host:/dest/</code></td><td>Sincroniza carpetas transfiriendo solo lo que cambió. El rey de los backups.</td></tr>
</tbody></table>

<h2>SSH: la puerta a tus servidores</h2>
<p><strong>SSH</strong> te da una shell en un servidor remoto de forma cifrada. Es la herramienta con la que administrarás servidores reales.</p>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">ssh</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">ssh ana@203.0.113.10</span>              <span class="cm"># conectar por contraseña</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">ssh <span class="fl">-p</span> 2222 ana@servidor.com</span>       <span class="cm"># puerto no estándar</span></div>
<div class="l"><span class="cm"># --- mejor: autenticación por clave (sin contraseña) ---</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">ssh-keygen <span class="fl">-t</span> ed25519</span>             <span class="cm"># generar par de claves</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">ssh-copy-id ana@203.0.113.10</span>       <span class="cm"># instalar tu clave pública allá</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">ssh ana@203.0.113.10</span>              <span class="cm"># ahora entra sin pedir contraseña</span></div>
</div></div>
<div class="note tip"><span class="tag">Claves &gt; contraseñas</span>
La autenticación por clave SSH es más segura y más cómoda que la contraseña. La clave <em>privada</em> nunca sale de tu máquina; la <em>pública</em> se copia al servidor. En el módulo de seguridad vas a desactivar el login por contraseña por completo.</div>

<h2>Firewall</h2>
<p>El firewall controla qué puertos aceptan conexiones. En Ubuntu, <code>ufw</code> es el más simple:</p>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">ufw</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">sudo ufw allow 22/tcp</span>       <span class="cm"># permitir SSH — ¡hacelo ANTES de activar!</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo ufw allow 80,443/tcp</span>   <span class="cm"># web HTTP y HTTPS</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo ufw enable</span>            <span class="cm"># activar el firewall</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo ufw status numbered</span>    <span class="cm"># ver reglas</span></div>
</div></div>
<div class="note warn"><span class="tag">No te dejes afuera</span>
Si activás el firewall sin permitir el puerto 22 primero, perdés el acceso SSH al servidor remoto y quedás bloqueado. Permitir SSH siempre va <em>antes</em> de <code>ufw enable</code>.</div>

<div class="exercise">
<div class="xh">▸ Ejercicios prácticos</div>
<ol>
<li>Averiguá la dirección IP de tu máquina y cuál es tu gateway (puerta de enlace).</li>
<li>Comprobá que tenés salida a internet haciendo ping a <code>1.1.1.1</code> (4 paquetes y frená).</li>
<li>Averiguá a qué IP resuelve el dominio <code>github.com</code>.</li>
<li>Listá todos los puertos que tu sistema está escuchando actualmente.</li>
<li>Descargá la portada de <code>example.com</code> a un archivo <code>index.html</code>.</li>
<li>Generá un par de claves SSH ed25519 (sin contraseña para la práctica).</li>
</ol>
<details class="sol"><summary>Ver soluciones</summary>
<div class="term"><div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">soluciones</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">ip addr; ip route | grep default</span>       <span class="cm"># 1</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">ping <span class="fl">-c 4</span> 1.1.1.1</span>                   <span class="cm"># 2</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">dig <span class="fl">+short</span> github.com</span>              <span class="cm"># 3</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">ss <span class="fl">-tuln</span></span>                          <span class="cm"># 4</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">curl <span class="fl">-o</span> index.html https://example.com</span>  <span class="cm"># 5</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">ssh-keygen <span class="fl">-t</span> ed25519 <span class="fl">-N</span> <span class="hl">""</span></span>          <span class="cm"># 6</span></div>
</div></div>
</details>
</div>
`});

/* ============ MÓDULO 10: MONITOREO ============ */
reg({idx:'10',group:'Redes y servicios',navTitle:'Monitoreo',html:`
<div class="topbar"><span class="path">tty0 / servicios / <b>monitoreo</b></span></div>
<div class="mod-head">
  <span class="level int">nivel intermedio</span>
  <h1><span class="n">10.</span> Monitorear el sistema</h1>
  <p class="lead">CPU, memoria, disco y logs. Cuando algo va lento o se cae, estos comandos te dicen dónde mirar.</p>
</div>

<h2>El chequeo rápido de salud</h2>
<p>Cuando entrás a un servidor con problemas, esta es la ronda de diagnóstico inicial:</p>
<div class="diagram">
<svg viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace" font-size="12">
  <g>
    <rect x="20" y="20" width="130" height="50" rx="8" fill="#1e2128" stroke="#f2a541"/><text x="85" y="42" text-anchor="middle" fill="#f2a541" font-weight="700">CPU</text><text x="85" y="60" text-anchor="middle" fill="#9aa0ac">uptime · top</text>
    <rect x="165" y="20" width="130" height="50" rx="8" fill="#1e2128" stroke="#8ec07c"/><text x="230" y="42" text-anchor="middle" fill="#8ec07c" font-weight="700">Memoria</text><text x="230" y="60" text-anchor="middle" fill="#9aa0ac">free -h</text>
    <rect x="310" y="20" width="130" height="50" rx="8" fill="#1e2128" stroke="#7cc5c9"/><text x="375" y="42" text-anchor="middle" fill="#7cc5c9" font-weight="700">Disco</text><text x="375" y="60" text-anchor="middle" fill="#9aa0ac">df -h · du</text>
    <rect x="455" y="20" width="130" height="50" rx="8" fill="#1e2128" stroke="#b48ead"/><text x="520" y="42" text-anchor="middle" fill="#b48ead" font-weight="700">Logs</text><text x="520" y="60" text-anchor="middle" fill="#9aa0ac">journalctl</text>
  </g>
  <text x="300" y="110" text-anchor="middle" fill="#6b7280" font-size="11">las cuatro preguntas: ¿se satura el CPU? ¿falta RAM? ¿se llenó el disco? ¿qué dicen los logs?</text>
</svg>
<div class="cap">La ronda de diagnóstico de todo administrador</div>
</div>

<h2>CPU y carga</h2>
<table class="cmdtable">
<thead><tr><th>Comando</th><th>Qué muestra</th></tr></thead>
<tbody>
<tr><td><code>uptime</code></td><td>Tiempo encendido y <strong>load average</strong> (carga a 1, 5 y 15 min).</td></tr>
<tr><td><code>top</code> / <code>htop</code></td><td>Uso de CPU en vivo por proceso.</td></tr>
<tr><td><code>nproc</code></td><td>Número de núcleos (para interpretar el load average).</td></tr>
<tr><td><code>vmstat 1</code></td><td>Estadísticas de CPU, memoria y E/S actualizadas cada segundo.</td></tr>
</tbody></table>
<div class="note info"><span class="tag">Leer el load average</span>
Si <code>uptime</code> dice <code>load average: 2.0</code> y tenés 4 núcleos, el sistema está al 50% (2 de 4 ocupados en promedio). Un load igual al número de núcleos = saturación. Muy por encima = el servidor está sufriendo.</div>

<h2>Memoria</h2>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">free -h</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">free <span class="fl">-h</span></span></div>
<div class="l"><span class="out">               total   usado   libre   compartido  buff/cache  disponible</span></div>
<div class="l"><span class="out">Mem:           7.8Gi   2.1Gi   3.2Gi      120Mi      2.5Gi     </span><span class="hl">5.3Gi</span></div>
<div class="l"><span class="out">Swap:          2.0Gi   0.0Gi   2.0Gi</span></div>
<div class="l"><span class="cm"># mirá "disponible", no "libre": buff/cache se libera si hace falta</span></div>
</div></div>

<h2>Disco</h2>
<table class="cmdtable">
<thead><tr><th>Comando</th><th>Qué muestra</th></tr></thead>
<tbody>
<tr><td><code>df -h</code></td><td>Espacio usado y libre por partición (legible). Empezá siempre por acá.</td></tr>
<tr><td><code>du -sh /var/log</code></td><td>Cuánto pesa una carpeta concreta.</td></tr>
<tr><td><code>du -h --max-depth=1 / | sort -rh</code></td><td>Qué carpetas del raíz ocupan más (para cazar al culpable).</td></tr>
<tr><td><code>ncdu /</code></td><td>Explorador interactivo de uso de disco (se instala aparte). El favorito.</td></tr>
</tbody></table>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">df -h — el disco está por llenarse</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">df <span class="fl">-h</span></span></div>
<div class="l"><span class="out">Filesystem      Size  Used Avail Use% Mounted on</span></div>
<div class="l"><span class="out">/dev/sda1        40G   36G  2.0G  </span><span class="warn">95%</span><span class="out"> /</span>          <span class="cm"># ⚠ atención</span></div>
<div class="l"><span class="out">/dev/sdb1       100G   12G   83G   </span><span class="ok">13%</span><span class="out"> /data</span></div>
</div></div>
<div class="note warn"><span class="tag">Disco lleno = servidor caído</span>
Un disco al 100% rompe casi todo: servicios que no arrancan, bases que se corrompen, logs que no se escriben. Vigilá <code>/</code> y <code>/var</code>. Los sospechosos habituales de llenar disco: logs sin rotar, backups viejos y cachés.</div>

<h2>Quién está conectado y qué pasó</h2>
<table class="cmdtable">
<thead><tr><th>Comando</th><th>Qué muestra</th></tr></thead>
<tbody>
<tr><td><code>w</code> / <code>who</code></td><td>Usuarios conectados ahora mismo.</td></tr>
<tr><td><code>last</code></td><td>Historial de inicios de sesión.</td></tr>
<tr><td><code>dmesg -T</code></td><td>Mensajes del kernel (útil ante fallos de hardware o discos).</td></tr>
<tr><td><code>journalctl -p err -b</code></td><td>Todos los errores desde el último arranque.</td></tr>
</tbody></table>

<div class="exercise">
<div class="xh">▸ Ejercicios prácticos</div>
<ol>
<li>Averiguá hace cuánto está encendido tu sistema y cuál es su carga promedio.</li>
<li>Mostrá cuánta memoria RAM tenés disponible en formato legible.</li>
<li>Verificá cuánto espacio libre queda en tu partición raíz.</li>
<li>Encontrá qué carpeta dentro de <code>/var</code> ocupa más espacio.</li>
<li>Mostrá los últimos 5 inicios de sesión en el sistema.</li>
<li>Revisá si hubo errores registrados desde el último arranque.</li>
</ol>
<details class="sol"><summary>Ver soluciones</summary>
<div class="term"><div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">soluciones</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">uptime</span>                                <span class="cm"># 1</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">free <span class="fl">-h</span></span>                               <span class="cm"># 2</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">df <span class="fl">-h</span> /</span>                              <span class="cm"># 3</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo du <span class="fl">-h --max-depth=1</span> /var | sort <span class="fl">-rh</span> | head</span>  <span class="cm"># 4</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">last <span class="fl">-5</span></span>                              <span class="cm"># 5</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">journalctl <span class="fl">-p</span> err <span class="fl">-b</span></span>                    <span class="cm"># 6</span></div>
</div></div>
</details>
</div>
`});
</script>

<script>
/* ============ MÓDULO 11: CRON ============ */
reg({idx:'11',group:'Redes y servicios',navTitle:'Tareas programadas',html:`
<div class="topbar"><span class="path">tty0 / servicios / <b>tareas programadas</b></span></div>
<div class="mod-head">
  <span class="level int">nivel intermedio</span>
  <h1><span class="n">11.</span> Automatizar con cron</h1>
  <p class="lead">Ejecutar tareas de mantenimiento solas: backups nocturnos, limpieza de logs, chequeos periódicos. Un servidor bien administrado se cuida a sí mismo.</p>
</div>

<h2>cron: el reloj del sistema</h2>
<p><strong>cron</strong> ejecuta comandos en horarios programados. Editás tus tareas con <code>crontab -e</code>. Cada línea tiene cinco campos de tiempo seguidos del comando:</p>
<div class="diagram">
<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace" font-size="13">
  <text x="60" y="40" fill="#f2a541" font-size="22" letter-spacing="14">* * * * *</text>
  <line x1="70" y1="50" x2="70" y2="80" stroke="#8ec07c"/><text x="70" y="98" text-anchor="middle" fill="#8ec07c" font-size="11">minuto</text><text x="70" y="112" text-anchor="middle" fill="#6b7280" font-size="10">0-59</text>
  <line x1="118" y1="50" x2="118" y2="100" stroke="#7cc5c9"/><text x="118" y="128" text-anchor="middle" fill="#7cc5c9" font-size="11">hora</text><text x="118" y="142" text-anchor="middle" fill="#6b7280" font-size="10">0-23</text>
  <line x1="166" y1="50" x2="166" y2="120" stroke="#b48ead"/><text x="166" y="158" text-anchor="middle" fill="#b48ead" font-size="11">día mes</text><text x="166" y="172" text-anchor="middle" fill="#6b7280" font-size="10">1-31</text>
  <line x1="214" y1="50" x2="214" y2="80" stroke="#e07a5f"/><text x="270" y="98" text-anchor="middle" fill="#e07a5f" font-size="11">mes (1-12)</text>
  <line x1="262" y1="50" x2="262" y2="120" stroke="#f2a541"/><text x="370" y="158" text-anchor="middle" fill="#f2a541" font-size="11">día semana (0-7, 0=dom)</text>
  <text x="60" y="195" fill="#6b7280" font-size="11">* significa "cada / cualquiera"</text>
</svg>
<div class="cap">minuto · hora · día-del-mes · mes · día-de-semana · comando</div>
</div>

<h2>Ejemplos que se leen solos</h2>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">crontab -e</span></div>
<div class="term-body">
<div class="l"><span class="cm"># cada día a las 3:00 AM → backup</span></div>
<div class="l"><span class="fl">0 3 * * *</span> <span class="cmd">/opt/scripts/backup.sh</span></div>
<div class="l"></div>
<div class="l"><span class="cm"># cada 15 minutos → chequeo de salud</span></div>
<div class="l"><span class="fl">*/15 * * * *</span> <span class="cmd">/opt/scripts/healthcheck.sh</span></div>
<div class="l"></div>
<div class="l"><span class="cm"># lunes a viernes a las 8:00 → reporte</span></div>
<div class="l"><span class="fl">0 8 * * 1-5</span> <span class="cmd">/opt/scripts/reporte.sh</span></div>
<div class="l"></div>
<div class="l"><span class="cm"># primer día de cada mes a medianoche → rotar logs</span></div>
<div class="l"><span class="fl">0 0 1 * *</span> <span class="cmd">/opt/scripts/rotar_logs.sh</span></div>
</div></div>
<table class="cmdtable">
<thead><tr><th>Comando</th><th>Qué hace</th></tr></thead>
<tbody>
<tr><td><code>crontab -e</code></td><td>Editar tus tareas cron.</td></tr>
<tr><td><code>crontab -l</code></td><td>Listar tus tareas actuales.</td></tr>
<tr><td><code>crontab -r</code></td><td>Borrar todas tus tareas (¡cuidado!).</td></tr>
<tr><td><code>sudo crontab -e</code></td><td>Editar el cron de root (tareas del sistema).</td></tr>
</tbody></table>
<div class="note tip"><span class="tag">¿No sabés la sintaxis?</span>
La web <a href="https://crontab.guru">crontab.guru</a> traduce cualquier expresión cron a lenguaje natural. Y para no perder los errores, redirigí la salida a un log: <code>0 3 * * * /opt/backup.sh &gt;&gt; /var/log/backup.log 2&gt;&1</code>.</div>

<h2>Alternativas: at y timers de systemd</h2>
<ul>
<li><code>at</code> — para una tarea <strong>única</strong> en el futuro: <code>echo "reboot" | at 02:00</code>.</li>
<li><strong>systemd timers</strong> — la opción moderna: más potente que cron, se integra con los servicios y sus logs quedan en <code>journalctl</code>. Ideal cuando ya definiste tu tarea como un servicio.</li>
</ul>

<div class="exercise">
<div class="xh">▸ Ejercicios prácticos</div>
<ol>
<li>Escribí (en papel o mentalmente) la expresión cron para "cada domingo a las 23:30".</li>
<li>Creá un script <code>~/fecha.sh</code> que agregue la fecha actual a <code>~/registro.txt</code>. Dale permiso de ejecución.</li>
<li>Programá una tarea cron que ejecute ese script cada minuto.</li>
<li>Esperá dos minutos y verificá que <code>~/registro.txt</code> tiene nuevas líneas.</li>
<li>Listá tus tareas cron y luego eliminá la que creaste.</li>
</ol>
<details class="sol"><summary>Ver soluciones</summary>
<div class="term"><div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">soluciones</span></div>
<div class="term-body">
<div class="l"><span class="cm"># 1) 30 23 * * 0</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">echo <span class="hl">'date &gt;&gt; ~/registro.txt'</span> &gt; ~/fecha.sh</span>  <span class="cm"># 2</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">chmod +x ~/fecha.sh</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">crontab <span class="fl">-e</span></span>   <span class="cm"># 3) agregá:  * * * * * ~/fecha.sh</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">cat ~/registro.txt</span>                        <span class="cm"># 4</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">crontab <span class="fl">-l</span></span>   <span class="cm"># 5) listar; luego crontab -e y borrar la línea</span></div>
</div></div>
</details>
</div>
`});

/* ============ MÓDULO 12: DISCOS ============ */
reg({idx:'12',group:'Avanzado',navTitle:'Discos y almacenamiento',html:`
<div class="topbar"><span class="path">tty0 / avanzado / <b>discos y almacenamiento</b></span></div>
<div class="mod-head">
  <span class="level adv">nivel avanzado</span>
  <h1><span class="n">12.</span> Discos, particiones y montaje</h1>
  <p class="lead">Agregar un disco nuevo, particionarlo, formatearlo y montarlo de forma permanente. Fundamental cuando un servidor necesita más almacenamiento.</p>
</div>

<h2>Cómo ve Linux los discos</h2>
<p>Cada disco es un archivo en <code>/dev/</code>: <code>sda</code>, <code>sdb</code> (SATA/USB) o <code>nvme0n1</code> (SSD NVMe). Sus particiones se numeran: <code>sda1</code>, <code>sda2</code>. Para verlos todos:</p>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">lsblk</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">lsblk</span></div>
<div class="l"><span class="out">NAME   SIZE TYPE MOUNTPOINT</span></div>
<div class="l"><span class="out">sda     40G disk</span></div>
<div class="l"><span class="out">└─sda1  40G part </span><span class="hl">/</span>              <span class="cm"># disco del sistema</span></div>
<div class="l"><span class="out">sdb    100G disk</span>                <span class="cm"># disco nuevo, sin particionar</span></div>
</div></div>

<h2>El flujo de agregar un disco</h2>
<div class="diagram">
<svg viewBox="0 0 600 90" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace" font-size="11">
  <g>
    <rect x="10" y="25" width="105" height="40" rx="7" fill="#1e2128" stroke="#f2a541"/><text x="62" y="43" text-anchor="middle" fill="#f2a541">1. particionar</text><text x="62" y="57" text-anchor="middle" fill="#6b7280">fdisk</text>
    <rect x="135" y="25" width="105" height="40" rx="7" fill="#1e2128" stroke="#8ec07c"/><text x="187" y="43" text-anchor="middle" fill="#8ec07c">2. formatear</text><text x="187" y="57" text-anchor="middle" fill="#6b7280">mkfs</text>
    <rect x="260" y="25" width="105" height="40" rx="7" fill="#1e2128" stroke="#7cc5c9"/><text x="312" y="43" text-anchor="middle" fill="#7cc5c9">3. montar</text><text x="312" y="57" text-anchor="middle" fill="#6b7280">mount</text>
    <rect x="385" y="25" width="130" height="40" rx="7" fill="#1e2128" stroke="#b48ead"/><text x="450" y="43" text-anchor="middle" fill="#b48ead">4. permanente</text><text x="450" y="57" text-anchor="middle" fill="#6b7280">/etc/fstab</text>
  </g>
  <line x1="115" y1="45" x2="133" y2="45" stroke="#6b7280"/><line x1="240" y1="45" x2="258" y2="45" stroke="#6b7280"/><line x1="365" y1="45" x2="383" y2="45" stroke="#6b7280"/>
</svg>
<div class="cap">De disco crudo a carpeta usable</div>
</div>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">agregar /dev/sdb</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">sudo fdisk /dev/sdb</span>          <span class="cm"># 1) n (nueva) → w (guardar)</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo mkfs.ext4 /dev/sdb1</span>     <span class="cm"># 2) formatear con ext4</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo mkdir /data</span>             <span class="cm"># 3) crear punto de montaje</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo mount /dev/sdb1 /data</span>   <span class="cm">#    montar (temporal, hasta reiniciar)</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">df <span class="fl">-h</span> /data</span>                <span class="cm">#    verificar</span></div>
</div></div>

<h2>Montaje permanente: /etc/fstab</h2>
<p>El montaje con <code>mount</code> se pierde al reiniciar. Para que sea permanente, se agrega una línea a <code>/etc/fstab</code>. Se usa el <strong>UUID</strong> del disco (estable) en vez del nombre <code>/dev/sdb1</code> (puede cambiar):</p>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">fstab</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">sudo blkid /dev/sdb1</span>          <span class="cm"># obtener el UUID</span></div>
<div class="l"><span class="out">/dev/sdb1: UUID="a1b2c3d4-..." TYPE="ext4"</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo nano /etc/fstab</span>          <span class="cm"># agregar la línea:</span></div>
<div class="l"><span class="cmd">UUID=a1b2c3d4-... /data ext4 defaults 0 2</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo mount <span class="fl">-a</span></span>                <span class="cm"># probar fstab SIN reiniciar</span></div>
</div></div>
<div class="note warn"><span class="tag">Un error en fstab puede frenar el arranque</span>
Si escribís mal una línea de <code>/etc/fstab</code>, el servidor puede no bootear. Por eso <code>sudo mount -a</code> es obligatorio: prueba todas las entradas ahora mismo. Si no da error, el reinicio será seguro.</div>

<h2>LVM: flexibilidad para producción</h2>
<p><strong>LVM</strong> (Logical Volume Manager) es una capa que permite redimensionar y combinar discos sin reparticionar. En servidores serios es el estándar. El concepto en tres niveles: los discos físicos (PV) forman un grupo (VG) del que se cortan volúmenes lógicos (LV) que sí montás. Su gran ventaja: podés <strong>agrandar un volumen en caliente</strong> cuando se queda sin espacio, sumando otro disco al grupo. Es un tema amplio; por ahora alcanza con saber que existe y para qué sirve.</p>

<div class="exercise">
<div class="xh">▸ Ejercicios prácticos</div>
<div class="note info" style="margin-top:0"><span class="tag">Nota de laboratorio</span>Estos ejercicios modifican discos. Hacelos en una máquina virtual con un segundo disco de prueba, nunca en un equipo con datos importantes.</div>
<ol>
<li>Listá todos los discos y particiones de tu sistema en formato de árbol.</li>
<li>Identificá cuál es tu disco del sistema y cuál (si hay) está sin usar.</li>
<li>Sobre un disco de prueba, creá una partición, formateala en ext4 y montala en <code>/mnt/prueba</code>.</li>
<li>Obtené el UUID de esa partición.</li>
<li>Verificá el espacio disponible del nuevo montaje y luego desmontalo con <code>umount</code>.</li>
</ol>
<details class="sol"><summary>Ver soluciones</summary>
<div class="term"><div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">soluciones</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">lsblk</span>                              <span class="cm"># 1 y 2</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo fdisk /dev/sdb</span>                <span class="cm"># 3) n, w</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo mkfs.ext4 /dev/sdb1</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo mkdir <span class="fl">-p</span> /mnt/prueba</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo mount /dev/sdb1 /mnt/prueba</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo blkid /dev/sdb1</span>               <span class="cm"># 4</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">df <span class="fl">-h</span> /mnt/prueba; sudo umount /mnt/prueba</span>  <span class="cm"># 5</span></div>
</div></div>
</details>
</div>
`});
</script>

<script>
/* ============ MÓDULO 13: BASH SCRIPTING ============ */
reg({idx:'13',group:'Avanzado',navTitle:'Scripting en Bash',html:`
<div class="topbar"><span class="path">tty0 / avanzado / <b>scripting</b></span></div>
<div class="mod-head">
  <span class="level adv">nivel avanzado</span>
  <h1><span class="n">13.</span> Scripting en Bash</h1>
  <p class="lead">Convertir tus comandos en programas reutilizables. Acá dejás de ejecutar tareas una por una y empezás a automatizar de verdad.</p>
</div>

<h2>Tu primer script</h2>
<p>Un script es un archivo de texto con comandos. La primera línea, el <strong>shebang</strong>, le dice al sistema qué intérprete usar:</p>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">hola.sh</span></div>
<div class="term-body">
<div class="l"><span class="hl">#!/bin/bash</span>              <span class="cm"># shebang: usar bash</span></div>
<div class="l"><span class="cmd">echo <span class="hl">"Hola, $(whoami)"</span></span></div>
<div class="l"><span class="cmd">echo <span class="hl">"Hoy es $(date +%A)"</span></span></div>
</div></div>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">ejecutarlo</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">chmod +x hola.sh</span>   <span class="cm"># darle permiso de ejecución</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">./hola.sh</span></div>
<div class="l"><span class="out">Hola, ana</span></div>
<div class="l"><span class="out">Hoy es martes</span></div>
</div></div>

<h2>Variables y argumentos</h2>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">variables</span></div>
<div class="term-body">
<div class="l"><span class="hl">#!/bin/bash</span></div>
<div class="l"><span class="cmd">nombre=<span class="hl">"servidor-web"</span></span>       <span class="cm"># sin espacios alrededor del =</span></div>
<div class="l"><span class="cmd">echo <span class="hl">"Nodo: \${nombre}"</span></span>      <span class="cm"># se usa con $ (llaves opcionales)</span></div>
<div class="l"></div>
<div class="l"><span class="cm"># argumentos que se pasan al script:</span></div>
<div class="l"><span class="cmd">echo <span class="hl">"Primer argumento: \$1"</span></span></div>
<div class="l"><span class="cmd">echo <span class="hl">"Cantidad de argumentos: \$#"</span></span></div>
<div class="l"><span class="cmd">ruta=$(pwd)</span>              <span class="cm"># guardar la salida de un comando</span></div>
</div></div>
<div class="note tip"><span class="tag">Comillas siempre</span>
Encerrá las variables entre comillas dobles: <code>"$archivo"</code>. Si una ruta tiene espacios, sin comillas tu script se rompe. Es el error nº1 de los principiantes en Bash.</div>

<h2>Condicionales</h2>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">if / then</span></div>
<div class="term-body">
<div class="l"><span class="hl">#!/bin/bash</span></div>
<div class="l"><span class="cmd">archivo=<span class="hl">"/etc/passwd"</span></span></div>
<div class="l"></div>
<div class="l"><span class="fl">if</span> <span class="cmd">[ -f <span class="hl">"$archivo"</span> ]; </span><span class="fl">then</span></div>
<div class="l">  <span class="cmd">echo <span class="hl">"$archivo existe"</span></span></div>
<div class="l"><span class="fl">elif</span> <span class="cmd">[ -d <span class="hl">"$archivo"</span> ]; </span><span class="fl">then</span></div>
<div class="l">  <span class="cmd">echo <span class="hl">"es un directorio"</span></span></div>
<div class="l"><span class="fl">else</span></div>
<div class="l">  <span class="cmd">echo <span class="hl">"no existe"</span></span></div>
<div class="l"><span class="fl">fi</span></div>
</div></div>
<table class="cmdtable">
<thead><tr><th>Test</th><th>Verdadero si...</th></tr></thead>
<tbody>
<tr><td><code>-f ruta</code></td><td>existe y es un archivo</td></tr>
<tr><td><code>-d ruta</code></td><td>existe y es un directorio</td></tr>
<tr><td><code>-z "$var"</code></td><td>la variable está vacía</td></tr>
<tr><td><code>"$a" = "$b"</code></td><td>dos textos son iguales</td></tr>
<tr><td><code>$a -gt $b</code></td><td>a mayor que b (números: -eq -ne -lt -ge)</td></tr>
</tbody></table>

<h2>Bucles</h2>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">for / while</span></div>
<div class="term-body">
<div class="l"><span class="cm"># recorrer una lista</span></div>
<div class="l"><span class="fl">for</span> <span class="cmd">servicio in nginx ssh cron; </span><span class="fl">do</span></div>
<div class="l">  <span class="cmd">systemctl is-active <span class="hl">"$servicio"</span></span></div>
<div class="l"><span class="fl">done</span></div>
<div class="l"></div>
<div class="l"><span class="cm"># recorrer archivos</span></div>
<div class="l"><span class="fl">for</span> <span class="cmd">f in *.log; </span><span class="fl">do</span></div>
<div class="l">  <span class="cmd">gzip <span class="hl">"$f"</span></span>   <span class="cm"># comprimir cada log</span></div>
<div class="l"><span class="fl">done</span></div>
</div></div>

<h2>Funciones y un script real</h2>
<p>Juntemos todo en un chequeo de salud reutilizable:</p>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">healthcheck.sh</span></div>
<div class="term-body">
<div class="l"><span class="hl">#!/bin/bash</span></div>
<div class="l"><span class="cmd">set <span class="fl">-euo</span> pipefail</span>       <span class="cm"># frena ante errores: buena práctica</span></div>
<div class="l"></div>
<div class="l"><span class="cmd">avisar() {</span>            <span class="cm"># definir una función</span></div>
<div class="l">  <span class="cmd">echo <span class="hl">"[$(date +%H:%M)] $1"</span></span></div>
<div class="l"><span class="cmd">}</span></div>
<div class="l"></div>
<div class="l"><span class="cm"># disco por encima del 90%?</span></div>
<div class="l"><span class="cmd">uso=$(df / | awk <span class="hl">'NR==2 {print \$5}'</span> | tr <span class="fl">-d</span> <span class="hl">'%'</span>)</span></div>
<div class="l"><span class="fl">if</span> <span class="cmd">[ <span class="hl">"$uso"</span> <span class="fl">-gt</span> 90 ]; </span><span class="fl">then</span></div>
<div class="l">  <span class="cmd">avisar <span class="hl">"⚠ Disco al \${uso}%"</span></span></div>
<div class="l"><span class="fl">else</span></div>
<div class="l">  <span class="cmd">avisar <span class="hl">"✓ Disco OK (\${uso}%)"</span></span></div>
<div class="l"><span class="fl">fi</span></div>
<div class="l"></div>
<div class="l"><span class="cm"># servicios críticos activos?</span></div>
<div class="l"><span class="fl">for</span> <span class="cmd">svc in nginx ssh; </span><span class="fl">do</span></div>
<div class="l">  <span class="fl">if</span> <span class="cmd">systemctl is-active <span class="fl">--quiet</span> <span class="hl">"$svc"</span>; </span><span class="fl">then</span></div>
<div class="l">    <span class="cmd">avisar <span class="hl">"✓ $svc corriendo"</span></span></div>
<div class="l">  <span class="fl">else</span></div>
<div class="l">    <span class="cmd">avisar <span class="hl">"✗ $svc CAÍDO"</span></span></div>
<div class="l">  <span class="fl">fi</span></div>
<div class="l"><span class="fl">done</span></div>
</div></div>
<div class="note info"><span class="tag">La línea que salva scripts</span>
<code>set -euo pipefail</code> hace que el script se detenga ante cualquier error (<code>-e</code>), ante variables sin definir (<code>-u</code>) y ante fallos dentro de un pipe. Sin esto, un script puede seguir corriendo tras un error y causar daño silencioso.</div>

<div class="exercise">
<div class="xh">▸ Ejercicios prácticos</div>
<ol>
<li>Escribí un script que reciba un nombre como argumento e imprima "Bienvenido, [nombre]". Manejá el caso de que no reciba argumento.</li>
<li>Hacé un script que recorra todos los archivos <code>.txt</code> de una carpeta y muestre cuántas líneas tiene cada uno.</li>
<li>Escribí un script que revise si un servicio (pasado como argumento) está activo, e imprima un mensaje claro en cada caso.</li>
<li>Creá un backup: un script que comprima tu carpeta home en un <code>.tar.gz</code> con la fecha en el nombre del archivo.</li>
</ol>
<details class="sol"><summary>Ver soluciones</summary>
<div class="term"><div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">soluciones</span></div>
<div class="term-body">
<div class="l"><span class="cm"># 1) bienvenida.sh</span></div>
<div class="l"><span class="fl">if</span> <span class="cmd">[ <span class="fl">-z</span> <span class="hl">"$1"</span> ]; </span><span class="fl">then</span> <span class="cmd">echo <span class="hl">"Falta el nombre"</span>; exit 1; </span><span class="fl">fi</span></div>
<div class="l"><span class="cmd">echo <span class="hl">"Bienvenido, $1"</span></span></div>
<div class="l"></div>
<div class="l"><span class="cm"># 2) contar.sh</span></div>
<div class="l"><span class="fl">for</span> <span class="cmd">f in *.txt; </span><span class="fl">do</span> <span class="cmd">echo <span class="hl">"\$f: $(wc -l < "\$f") líneas"</span>; </span><span class="fl">done</span></div>
<div class="l"></div>
<div class="l"><span class="cm"># 3) estado.sh</span></div>
<div class="l"><span class="cmd">systemctl is-active <span class="fl">--quiet</span> <span class="hl">"$1"</span> && echo <span class="hl">"$1 activo"</span> || echo <span class="hl">"$1 inactivo"</span></span></div>
<div class="l"></div>
<div class="l"><span class="cm"># 4) backup.sh</span></div>
<div class="l"><span class="cmd">tar <span class="fl">-czf</span> <span class="hl">"backup-$(date +%F).tar.gz"</span> <span class="hl">"$HOME"</span></span></div>
</div></div>
</details>
</div>
`});

/* ============ MÓDULO 14: SEGURIDAD ============ */
reg({idx:'14',group:'Avanzado',navTitle:'Seguridad',html:`
<div class="topbar"><span class="path">tty0 / avanzado / <b>seguridad</b></span></div>
<div class="mod-head">
  <span class="level adv">nivel avanzado</span>
  <h1><span class="n">14.</span> Asegurar el servidor (hardening)</h1>
  <p class="lead">Un servidor conectado a internet es atacado constantemente. Estas medidas básicas cortan la enorme mayoría de los intentos automatizados.</p>
</div>

<h2>Asegurar el acceso SSH</h2>
<p>SSH es la puerta principal, y la más atacada. La configuración vive en <code>/etc/ssh/sshd_config</code>. Los tres cambios de mayor impacto:</p>
<table class="cmdtable">
<thead><tr><th>Ajuste</th><th>Por qué</th></tr></thead>
<tbody>
<tr><td><code>PermitRootLogin no</code></td><td>Nadie entra directo como root. Obliga a usar un usuario + sudo.</td></tr>
<tr><td><code>PasswordAuthentication no</code></td><td>Solo se entra con clave SSH. Elimina los ataques de fuerza bruta a contraseñas.</td></tr>
<tr><td><code>Port 2222</code></td><td>Cambiar el puerto (opcional) reduce el ruido de bots que escanean el 22.</td></tr>
</tbody></table>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">aplicar cambios de SSH</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">sudo nano /etc/ssh/sshd_config</span>   <span class="cm"># editar los ajustes de arriba</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo sshd <span class="fl">-t</span></span>                       <span class="cm"># validar la config ANTES de recargar</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo systemctl reload ssh</span></div>
</div></div>
<div class="note warn"><span class="tag">Regla de oro del acceso remoto</span>
Antes de desactivar el login por contraseña, confirmá que tu clave SSH funciona abriendo una <strong>segunda</strong> sesión. Nunca cierres la sesión actual hasta comprobar que la nueva configuración te deja entrar. Si algo sale mal, la sesión abierta es tu salvavidas.</div>

<h2>Firewall: cerrar todo menos lo necesario</h2>
<p>El principio es <strong>denegar por defecto, permitir lo justo</strong>. Con <code>ufw</code>:</p>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">política restrictiva</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">sudo ufw default deny incoming</span>    <span class="cm"># bloquear todo lo entrante</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo ufw default allow outgoing</span>   <span class="cm"># permitir todo lo saliente</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo ufw allow 22/tcp</span>             <span class="cm"># abrir solo SSH...</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo ufw allow 80,443/tcp</span>         <span class="cm"># ...y la web</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo ufw enable</span></div>
</div></div>

<h2>fail2ban: bloquear atacantes automáticamente</h2>
<p><strong>fail2ban</strong> vigila los logs y banea temporalmente cualquier IP con demasiados intentos fallidos de login. Es de instalación casi obligatoria en servidores públicos:</p>
<div class="term">
<div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">fail2ban</span></div>
<div class="term-body">
<div class="l"><span class="pr">$</span> <span class="cmd">sudo apt install <span class="fl">-y</span> fail2ban</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo systemctl enable <span class="fl">--now</span> fail2ban</span></div>
<div class="l"><span class="pr">$</span> <span class="cmd">sudo fail2ban-client status sshd</span>    <span class="cm"># ver IPs baneadas</span></div>
<div class="l"><span class="out">Currently banned: 3</span></div>
</div></div>

<h2>Actualizaciones y buenas prácticas</h2>
<ul>
<li><strong>Actualizá seguido.</strong> La mayoría de las intrusiones aprovechan fallos ya parcheados. Considerá activar <code>unattended-upgrades</code> para parches de seguridad automáticos.</li>
<li><strong>Principio de mínimo privilegio.</strong> Cada usuario y servicio solo con los permisos que necesita, ni uno más.</li>
<li><strong>Menos superficie de ataque.</strong> Desinstalá lo que no uses; cada servicio abierto es una puerta potencial.</li>
<li><strong>Revisá los accesos.</strong> <code>last</code>, <code>/var/log/auth.log</code> y <code>sudo fail2ban-client status</code> te muestran quién intentó entrar.</li>
<li><strong>Backups probados.</strong> Un backup que nunca restauraste no es un backup. Probá la restauración.</li>
</ul>
<div class="note tip"><span class="tag">Verificación rápida de superficie</span>
<code>ss -tuln</code> te dice qué está escuchando hacia afuera. Todo lo que aparezca ahí es una puerta: asegurate de que cada puerto abierto corresponde a un servicio que realmente necesitás exponer.</div>

<div class="exercise">
<div class="xh">▸ Ejercicios prácticos</div>
<div class="note info" style="margin-top:0"><span class="tag">Nota de laboratorio</span>Practicá esto en una VM. Si lo hacés en un servidor remoto real, mantené siempre una sesión abierta como respaldo.</div>
<ol>
<li>Revisá <code>/var/log/auth.log</code> y buscá intentos fallidos de login (líneas con "Failed password").</li>
<li>Instalá y activá fail2ban. Consultá el estado del "jail" de SSH.</li>
<li>Configurá el firewall con política de denegar entrantes, permitiendo solo SSH y HTTP/HTTPS.</li>
<li>En <code>sshd_config</code> (en tu VM), desactivá <code>PermitRootLogin</code>, validá con <code>sshd -t</code> y recargá.</li>
<li>Listá todos los puertos a la escucha y justificá para qué sirve cada uno.</li>
</ol>

  <h1><span class="n">15.</span> Proyecto: tu primer servidor web</h1>
  <p class="lead">Ponés en práctica todo el curso montando desde cero un servidor web real, con dominio, HTTPS, backups automáticos y monitoreo.</p>
</div>

<p>Este proyecto encadena lo que aprendiste. Hacelo en una VM o en un VPS de prueba. No hay soluciones al final: la meta es que tomes decisiones y consultes los módulos anteriores cuando lo necesites. Considerá cada fase completa cuando puedas explicar <em>por qué</em> hiciste cada paso.</p>

<h2>Fase 1 — Preparar el sistema</h2>
<ol>
<li>Actualizá el sistema completo (<em>módulo 6</em>).</li>
<li>Creá un usuario administrador con sudo y desde ahí dejá de usar root (<em>módulo 4</em>).</li>
<li>Configurá acceso SSH por clave y desactivá el login por contraseña (<em>módulos 9 y 14</em>).</li>
<li>Activá el firewall permitiendo SSH, HTTP y HTTPS (<em>módulos 9 y 14</em>).</li>
</ol>

<h2>Fase 2 — Montar el servidor web</h2>
<ol>
<li>Instalá <code>nginx</code> y verificá que arranca al bootear (<em>módulos 6 y 8</em>).</li>
<li>Publicá una página <code>index.html</code> propia en <code>/var/www/html</code> con los permisos y propietario correctos (<em>módulos 2 y 3</em>).</li>
<li>Comprobá con <code>curl</code> que responde, y revisá los logs de acceso (<em>módulos 8 y 9</em>).</li>
</ol>

<h2>Fase 3 — HTTPS y seguridad</h2>
<ol>
<li>Instalá <code>fail2ban</code> para proteger SSH (<em>módulo 14</em>).</li>
<li>Si tenés un dominio real apuntando al servidor, obtené un certificado gratuito con <code>certbot</code> para servir por HTTPS.</li>
<li>Verificá que solo los puertos necesarios están a la escucha (<em>módulos 9 y 14</em>).</li>
</ol>

<h2>Fase 4 — Automatización y monitoreo</h2>
<ol>
<li>Escribí un script de backup que comprima el sitio y la configuración con fecha en el nombre (<em>módulo 13</em>).</li>
<li>Programalo con cron para que corra cada noche (<em>módulo 11</em>).</li>
<li>Escribí un <code>healthcheck.sh</code> que revise disco, memoria y estado de nginx, y programalo cada 15 minutos (<em>módulos 10 y 13</em>).</li>
<li>Simulá un problema (detené nginx) y confirmá que tu chequeo lo detecta (<em>módulos 7, 8 y 10</em>).</li>
</ol>

<div class="note tip"><span class="tag">Criterio de "terminado"</span>
Tu servidor está listo cuando: sobrevive a un reinicio con todos los servicios levantados solos, solo acepta SSH por clave, sirve tu web, se respalda solo cada noche y te avisaría si algo se cae. Ese es, en esencia, el trabajo de un administrador de sistemas.</div>

<h2>¿Y ahora qué?</h2>
<p>Con estas bases sólidas, los siguientes pasos naturales son:</p>
<ul>
<li><strong>Docker y contenedores</strong> — empaquetar y desplegar aplicaciones de forma reproducible.</li>
<li><strong>Ansible</strong> — automatizar la configuración de muchos servidores a la vez.</li>
<li><strong>Nginx como reverse proxy</strong> — servir varias aplicaciones detrás de un solo servidor.</li>
<li><strong>Monitoreo con Prometheus + Grafana</strong> — paneles y alertas de nivel profesional.</li>
<li><strong>Git y CI/CD</strong> — versionar tu infraestructura y desplegar automáticamente.</li>
</ul>
<p>Pero lo más importante ya lo tenés: sabés moverte en la consola, entender qué pasa en el sistema y resolver problemas por tu cuenta. Todo lo demás se construye sobre eso. ¡A practicar!</p>

<script>
/* ---------- Render engine ---------- */
const main=document.getElementById('main');
const nav=document.getElementById('nav');
let done=new Set();
let current=0;

const GROUPS=[
  {t:"Fundamentos",lvl:"ini"},
  {t:"Gestión del sistema",lvl:"int"},
  {t:"Redes y servicios",lvl:"int"},
  {t:"Avanzado",lvl:"adv"},
];

function buildNav(){
  document.getElementById('ptot').textContent=MODS.length;
  let lastGroup=null;
  MODS.forEach((m,i)=>{
    if(m.group!==lastGroup){
      const g=document.createElement('div');g.className='nav-group';g.textContent=m.group;
      nav.appendChild(g);lastGroup=m.group;
    }
    const it=document.createElement('div');
    it.className='nav-item';it.dataset.i=i;
    it.innerHTML=`<span class="idx">${m.idx}</span><span>${m.navTitle}</span><span class="check">✓</span>`;
    it.onclick=()=>go(i);
    nav.appendChild(it);
  });
}
function renderModules(){
  MODS.forEach((m,i)=>{
    const sec=document.createElement('section');
    sec.className='module';sec.id='m'+i;
    let footer='';
    if(m.idx!=='~'){
      footer+=`<button class="mark-done" onclick="toggleDone(${i})">Marcar módulo como completado</button>`;
    }
    const prev=i>0?`<button onclick="go(${i-1})"><span class="k">← anterior</span>${MODS[i-1].navTitle}</button>`:'<button disabled>&nbsp;</button>';
    const next=i<MODS.length-1?`<button class="next" onclick="go(${i+1})"><span class="k">siguiente →</span>${MODS[i+1].navTitle}</button>`:'<button class="next" disabled>&nbsp;</button>';
    footer+=`<div class="pager">${prev}${next}</div>`;
    sec.innerHTML=m.html+footer;
    main.appendChild(sec);
  });
}
function go(i){
  current=i;
  document.querySelectorAll('.module').forEach(s=>s.classList.remove('active'));
  document.getElementById('m'+i).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',+n.dataset.i===i));
  window.scrollTo({top:0,behavior:'instant'});
  if(window.innerWidth<=860)closeSide();
  syncNav();
}
function toggleDone(i){
  if(done.has(i))done.delete(i);else done.add(i);
  syncNav();
}
function syncNav(){
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('done',done.has(+n.dataset.i));
  });
  const d=done.size;
  document.getElementById('pdone').textContent=d;
  document.getElementById('pbar').style.width=(d/MODS.length*100)+'%';
  const btn=document.querySelector('#m'+current+' .mark-done');
  if(btn){
    const isd=done.has(current);
    btn.classList.toggle('is-done',isd);
    btn.textContent=isd?'✓ Módulo completado':'Marcar módulo como completado';
  }
}
function toggleSide(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('backdrop').classList.toggle('show')}
function closeSide(){document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').classList.remove('show')}

function buildHomeGrid(){
  const g=document.getElementById('homegrid');if(!g)return;
  const desc={
    '01':'Shell, prompt y anatomía de un comando',
    '02':'Navegar el árbol de directorios y manipular archivos',
    '03':'Lectura, escritura, ejecución: chmod y chown',
    '04':'Cuentas, grupos y delegación con sudo',
    '05':'find, grep, pipes y análisis de logs',
    '06':'apt, dnf y mantenimiento del sistema',
    '07':'ps, top, señales y prioridades',
    '08':'systemctl, journalctl y crear servicios',
    '09':'ip, ping, ss, SSH y firewall',
    '10':'CPU, memoria, disco y diagnóstico',
    '11':'cron: automatizar el mantenimiento',
    '12':'Particionar, formatear, montar, fstab',
    '13':'Variables, bucles, funciones y scripts reales',
    '14':'SSH hardening, firewall y fail2ban',
    '15':'Montá un servidor web completo de punta a punta'
  };
  MODS.forEach((m,i)=>{
    if(m.idx==='~')return;
    const c=document.createElement('div');c.className='card';c.onclick=()=>go(i);
    c.innerHTML='<div class="cn">módulo '+m.idx+'</div><div class="ct">'+m.navTitle+'</div><div class="cd">'+(desc[m.idx]||'')+'</div>';
    g.appendChild(c);
  });
}
buildNav();renderModules();buildHomeGrid();go(0);
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SUMMARY'||e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'&&current<MODS.length-1)go(current+1);
  if(e.key==='ArrowLeft'&&current>0)go(current-1);
});
</script>
